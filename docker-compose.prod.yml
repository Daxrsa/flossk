services:
  postgres:
    image: postgres:16-alpine
    container_name: flossk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: FLOSSK
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FLOSSK"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    container_name: flossk-clamav
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  api:
    build:
      context: ./flossk-ms
      dockerfile: FlosskMS.API/Dockerfile
    container_name: flossk-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=FLOSSK;Username=postgres;Password=${POSTGRES_PASSWORD}"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: FlosskMS
      JwtSettings__Audience: FlosskMS
      JwtSettings__ExpirationInMinutes: 720
      ClamAvSettings__Host: clamav
      ClamAvSettings__Port: 3310
      ClamAvSettings__TimeoutMs: 30000
      ResendSettings__ApiKey: ${RESEND_API_KEY}
      ResendSettings__FromEmail: ${RESEND_FROM_EMAIL}
      ResendSettings__FromName: FlosskMS
      ResendSettings__FrontendBaseUrl: ${FRONTEND_BASE_URL}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy

  frontend:
    build:
      context: ./sakai-ng
      dockerfile: Dockerfile
    container_name: flossk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres-data:
  clamav-db:
  uploads: